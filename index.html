<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Game</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="content">
      <h2 class="content__title">Rock Paper Scissors</h2>
      <div class="wrapper">
        <div class="wrapper__element">
            <img src="paper.png" alt="" class="first__player">
            <p class="player">1-player</p>
        </div>
        <div class="wrapper__element">
            <img src="paper.png" alt="" class="second__player">
            <p class="player">2-player</p>
        </div>
      </div>

      <button class="btn">start</button>
      <p class="result"></p>
    </div>




     <script src="./app.js"></script>
</body> 
</html>
